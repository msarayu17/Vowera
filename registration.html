<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Package Registration | Vowera</title>
        <link rel="stylesheet" href="registration.css">
        <link rel="icon" href="vowera.png">
    </head>

    <body>

        <div class="form-container">
            <h2>Register for Your Package</h2>
            <p class="subtitle"><i>Fill in your details and let’s begin your journey 💍</i></p>

            <form action="thankyou.html" method="get">

                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required>

                <label for="package">Selected Package</label>
                <select id="package" name="package" required>
                    <option value="">-- Select Package --</option>
                    <option value="silver">Silver Package</option>
                    <option value="gold">Gold Package</option>
                    <option value="platinum">Platinum Package</option>
                </select>

                <label for="date">Preferred Wedding Date</label>
                <input type="date" id="date" name="date" required>

                <label for="notes">Additional Notes</label>
                <textarea id="notes" name="notes" rows="4" placeholder="Any special requests..."></textarea>

                <button type="submit">Submit Registration</button>
            </form>
        </div>

    </body>

</html>
